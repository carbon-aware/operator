apiVersion: batch.carbonaware.dev/v1alpha1
kind: CarbonAwareJob
metadata:
  name: simple-pi-calculation
  namespace: default
spec:
  maxDelay: "30m"
  jobExecutionDuration: "5m"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: pi-calculator
            image: perl:5.34
            command: ["perl"]
            args: ["-Mbignum=bpi", "-wle", "print bpi(2000)"]
            resources:
              requests:
                memory: "64Mi"
                cpu: "250m"
              limits:
                memory: "128Mi"
                cpu: "500m"
          restartPolicy: Never